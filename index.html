<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Study Planner</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>


<body>


    <!-- ==================================================
         로그인 페이지
    =================================================== -->

    <div
        id="login-page"
        class="page"
    >

        <div class="login-container">

            <div class="login-brand">
                <div class="login-logo">
                    📚
                </div>

                <h1>
                    Study Planner
                </h1>

                <p>
                    나만의 공부 계획을 체계적으로 관리해보세요.
                </p>
            </div>


            <form id="login-form">

                <div class="form-group">

                    <label for="email">
                        이메일
                    </label>

                    <input
                        type="email"
                        id="email"
                        placeholder="이메일을 입력하세요"
                        autocomplete="email"
                        required
                    >

                </div>


                <div class="form-group">

                    <label for="password">
                        비밀번호
                    </label>

                    <input
                        type="password"
                        id="password"
                        placeholder="비밀번호를 입력하세요"
                        autocomplete="current-password"
                        required
                    >

                </div>


                <button
                    type="submit"
                    class="primary-button"
                >
                    로그인
                </button>


                <button
                    type="button"
                    id="signup-button"
                    class="secondary-button"
                >
                    회원가입
                </button>

            </form>


            <p id="login-message"></p>

        </div>

    </div>



    <!-- ==================================================
         메인 앱
    =================================================== -->

    <div
        id="app-page"
        class="page hidden"
    >


        <!-- ==================================================
             헤더
        =================================================== -->

        <header>

            <div class="header-left">

                <div class="header-brand-icon">
                    📚
                </div>

                <div>

                    <h1>
                        Study Planner
                    </h1>

                    <span class="header-subtitle">
                        나의 공부 관리
                    </span>

                </div>

            </div>


            <div class="header-right">

                <button
                    id="dark-mode-button"
                    class="icon-button"
                    aria-label="다크모드"
                    title="다크모드"
                >
                    🌙
                </button>


                <button
                    id="logout-button"
                    class="logout-button"
                >
                    로그아웃
                </button>

            </div>

        </header>



        <!-- ==================================================
             메인 콘텐츠
        =================================================== -->

        <main>


            <!-- ==================================================
                 날짜 네비게이션
            =================================================== -->

            <section class="date-section">

                <button
                    id="previous-date"
                    class="date-nav-button"
                    aria-label="이전 날짜"
                >
                    ◀
                </button>


                <div class="date-center">

                    <h2 id="current-date">
                        날짜
                    </h2>

                    <button
                        id="today-button"
                    >
                        오늘
                    </button>

                </div>


                <button
                    id="next-date"
                    class="date-nav-button"
                    aria-label="다음 날짜"
                >
                    ▶
                </button>

            </section>



            <!-- ==================================================
                 보기 방식
            =================================================== -->

            <section class="view-section">

                <button
                    class="view-button active"
                    data-view="day"
                >
                    일간
                </button>


                <button
                    class="view-button"
                    data-view="week"
                >
                    주간
                </button>


                <button
                    class="view-button"
                    data-view="month"
                >
                    월간
                </button>

            </section>



            <!-- ==================================================
                 공부 계획 추가
            =================================================== -->

            <section class="plan-add-section">

                <div class="section-header">

                    <div>

                        <span class="section-eyebrow">
                            PLAN
                        </span>

                        <h2>
                            ✏️ 공부 계획 추가
                        </h2>

                    </div>

                </div>


                <form id="plan-form">


                    <div class="form-group">

                        <label for="plan-subject">
                            과목
                        </label>

                        <input
                            type="text"
                            id="plan-subject"
                            placeholder="예: 수학"
                            required
                        >

                    </div>


                    <div class="form-group">

                        <label for="plan-detail">
                            세부 내용
                        </label>

                        <textarea
                            id="plan-detail"
                            placeholder="예: 미적분 적분 단원 문제 풀이 및 오답 분석"
                        ></textarea>

                    </div>


                    <div class="form-group">

                        <label for="plan-start">
                            시작 시간
                        </label>

                        <input
                            type="time"
                            id="plan-start"
                        >

                    </div>


                    <div class="form-group">

                        <label for="plan-end">
                            종료 시간
                        </label>

                        <input
                            type="time"
                            id="plan-end"
                        >

                    </div>


                    <button
                        type="submit"
                        class="primary-button"
                    >
                        <span>＋</span>
                        계획 추가
                    </button>


                </form>

            </section>



            <!-- ==================================================
                 계획 표시 영역
            =================================================== -->

            <section
                id="planner"
                class="planner-section"
            >

                <!-- JavaScript에서 동적으로 생성 -->

            </section>



            <!-- ==================================================
                 D-Day
            =================================================== -->

            <section class="dday-section">

                <div class="section-header">

                    <div>

                        <span class="section-eyebrow">
                            COUNTDOWN
                        </span>

                        <h2>
                            🎯 D-Day
                        </h2>

                    </div>

                </div>


                <form id="dday-form">


                    <div class="form-group">

                        <label for="dday-title">
                            일정 이름
                        </label>

                        <input
                            type="text"
                            id="dday-title"
                            placeholder="예: 중간고사"
                            required
                        >

                    </div>


                    <div class="form-group">

                        <label for="dday-date">
                            날짜
                        </label>

                        <input
                            type="date"
                            id="dday-date"
                            required
                        >

                    </div>


                    <button
                        type="submit"
                        class="primary-button"
                    >
                        D-Day 추가
                    </button>


                </form>


                <div id="dday-list">

                    <!-- JavaScript에서 동적으로 생성 -->

                </div>

            </section>



            <!-- ==================================================
                 공부 통계
            =================================================== -->

            <section class="statistics-section">


                <div class="section-header">

                    <div>

                        <span class="section-eyebrow">
                            ANALYTICS
                        </span>

                        <h2>
                            📊 공부 통계
                        </h2>

                    </div>

                </div>



                <!-- ==================================================
                     기본 통계 카드
                =================================================== -->

                <div class="statistics">


                    <div class="stat-card">

                        <div class="stat-card-icon">
                            📋
                        </div>

                        <h3>
                            전체 계획
                        </h3>

                        <strong id="total-plans">
                            0
                        </strong>

                    </div>


                    <div class="stat-card">

                        <div class="stat-card-icon">
                            ✅
                        </div>

                        <h3>
                            완료한 계획
                        </h3>

                        <strong id="completed-plans">
                            0
                        </strong>

                    </div>


                    <div class="stat-card">

                        <div class="stat-card-icon">
                            ⏱️
                        </div>

                        <h3>
                            공부 시간
                        </h3>

                        <strong id="study-time">
                            0시간
                        </strong>

                    </div>


                    <div class="stat-card">

                        <div class="stat-card-icon">
                            📈
                        </div>

                        <h3>
                            달성률
                        </h3>

                        <strong id="achievement">
                            0%
                        </strong>

                    </div>


                </div>



                <!-- ==================================================
                     기간별 공부 시간 그래프
                =================================================== -->

                <div
                    id="statistics-chart"
                >

                    <!-- JavaScript에서 동적으로 생성 -->

                </div>



                <!-- ==================================================
                     과목별 통계
                =================================================== -->

                <div
                    id="subject-statistics"
                    class="subject-statistics"
                >

                    <!-- JavaScript에서 동적으로 생성 -->

                </div>


            </section>



            <!-- ==================================================
                 PDF 출력
            =================================================== -->

            <section class="export-section">

                <button
                    id="pdf-button"
                >
                    <span>📄</span>
                    PDF로 저장
                </button>

            </section>


        </main>


    </div>



    <!-- ==================================================
         날짜 복사 모달
    =================================================== -->

    <div
        id="copy-modal"
        class="modal hidden"
    >

        <div class="modal-content">


            <button
                id="close-copy-modal"
                class="modal-close"
                aria-label="닫기"
            >
                ✕
            </button>


            <div class="modal-icon">
                📋
            </div>


            <h2>
                계획 복사
            </h2>


            <p>
                이 계획을 복사할 날짜를 선택하세요.
            </p>


            <div class="form-group">

                <label for="copy-target-date">
                    복사할 날짜
                </label>

                <input
                    type="date"
                    id="copy-target-date"
                >

            </div>


            <button
                id="confirm-copy-button"
                class="confirm-copy-button"
            >
                이 날짜로 복사
            </button>


        </div>

    </div>



    <!-- ==================================================
         외부 라이브러리
    =================================================== -->

    <script
        src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
    ></script>


    <!-- ==================================================
         Study Planner JavaScript
    =================================================== -->

    <script
        src="app.js"
        defer
    ></script>


</body>

</html>
